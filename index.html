<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 페이지 기본 설정 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 이야기를 들어줘!</title>

  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7986cb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="들어줘" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    /* ===========================
       전체 기본 스타일 설정
    =========================== */

    /* 모든 요소의 박스 크기 계산 방식 통일 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* 페이지 전체 배경색과 폰트 설정 */
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #f3e5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===========================
       채팅 화면 스타일
    =========================== */

    /* 채팅 전체 컨테이너 - 처음에는 숨겨져 있음 */
    #chat-screen {
      display: none; /* 처음에는 숨김, JavaScript로 표시 */
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 100vh;
      flex-direction: column;
      background: white;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.1);
      border-radius: 0;
      overflow: hidden;
    }

    /* 데스크탑에서 채팅창을 카드 형태로 표시 */
    @media (min-width: 768px) {
      #chat-screen {
        height: 90vh;
        max-height: 800px;
        border-radius: 24px;
        margin: 20px;
      }
    }

    /* ===========================
       헤더 스타일
    =========================== */

    /* 채팅 화면 상단 헤더 */
    .chat-header {
      background: linear-gradient(135deg, #7986cb, #64b5f6);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0; /* 헤더 크기 고정 */
    }

    /* 헤더 왼쪽 영역 (아이콘 + 제목) */
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* 헤더의 상담사 아바타 */
    .header-avatar {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    /* 헤더 제목 텍스트 */
    .header-title {
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    /* 헤더 부제목 (온라인 상태 표시) */
    .header-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px;
      margin-top: 2px;
    }

    /* 헤더 오른쪽 설정 버튼 */
    .header-settings-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      color: white;
    }

    .header-settings-btn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    /* ===========================
       메시지 목록 영역 스타일
    =========================== */

    /* 채팅 메시지들이 표시되는 스크롤 영역 */
    #messages-container {
      flex: 1; /* 남은 공간을 모두 차지 */
      overflow-y: auto; /* 세로 스크롤 허용 */
      padding: 20px 16px;
      background: #f8f9ff;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 스크롤바 스타일 (웹킷 브라우저) */
    #messages-container::-webkit-scrollbar {
      width: 4px;
    }

    #messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages-container::-webkit-scrollbar-thumb {
      background: #c5cae9;
      border-radius: 2px;
    }

    /* 날짜/시간 구분선 */
    .date-divider {
      text-align: center;
      font-size: 11px;
      color: #b0bec5;
      margin: 8px 0;
      position: relative;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: #e0e0e0;
    }

    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    /* ===========================
       메시지 버블 스타일
    =========================== */

    /* 개별 메시지 묶음 (아바타 + 말풍선) */
    .message-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }

    /* AI 메시지는 왼쪽 정렬 */
    .message-wrapper.ai {
      flex-direction: row;
    }

    /* 사용자 메시지는 오른쪽 정렬 */
    .message-wrapper.user {
      flex-direction: row-reverse;
    }

    /* AI 아바타 (말풍선 왼쪽에 표시) */
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7986cb, #64b5f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* 메시지 내용 영역 (말풍선 + 시간) */
    .message-content {
      max-width: 75%; /* 말풍선 최대 너비 */
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* 사용자 메시지 내용 영역 - 오른쪽 정렬 */
    .message-wrapper.user .message-content {
      align-items: flex-end;
    }

    /* AI 메시지 내용 영역 - 왼쪽 정렬 */
    .message-wrapper.ai .message-content {
      align-items: flex-start;
    }

    /* 실제 말풍선 */
    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word; /* 긴 단어 자동 줄바꿈 */
      white-space: pre-wrap; /* 줄바꿈 유지 */
    }

    /* AI 메시지 말풍선 스타일 */
    .message-wrapper.ai .message-bubble {
      background: white;
      color: #37474f;
      border-bottom-left-radius: 4px; /* 아바타 쪽 모서리만 뾰족하게 */
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* 사용자 메시지 말풍선 스타일 */
    .message-wrapper.user .message-bubble {
      background: linear-gradient(135deg, #7986cb, #5c6bc0);
      color: white;
      border-bottom-right-radius: 4px; /* 오른쪽 모서리 뾰족하게 */
    }

    /* 메시지 전송 시간 표시 */
    .message-time {
      font-size: 10px;
      color: #b0bec5;
      padding: 0 4px;
    }

    /* ===========================
       로딩 인디케이터 스타일
    =========================== */

    /* AI가 응답 중일 때 표시되는 로딩 말풍선 */
    .loading-bubble {
      background: white;
      padding: 14px 18px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      gap: 5px;
      align-items: center;
    }

    /* 로딩 점 3개 */
    .loading-dot {
      width: 8px;
      height: 8px;
      background: #b0bec5;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    /* 각 점마다 애니메이션 지연 시간 설정 */
    .loading-dot:nth-child(1) { animation-delay: 0s; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ===========================
       에러 메시지 스타일
    =========================== */

    /* 에러 발생 시 표시되는 메시지 */
    .error-message {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      color: #e65100;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    /* ===========================
       입력 영역 스타일
    =========================== */

    /* 메시지 입력창과 전송 버튼이 있는 하단 영역 */
    .chat-input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid #e8eaf6;
      flex-shrink: 0; /* 입력창 크기 고정 */
    }

    /* 입력창과 버튼을 가로로 배치하는 컨테이너 */
    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    /* 텍스트 입력창 */
    #message-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8eaf6;
      border-radius: 24px;
      font-size: 14px;
      color: #37474f;
      outline: none;
      resize: none; /* 사용자가 크기 조절 못하게 */
      max-height: 120px; /* 최대 높이 제한 */
      min-height: 44px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.3s ease;
      overflow-y: auto;
    }

    /* 입력창 포커스 시 테두리 색 변경 */
    #message-input:focus {
      border-color: #7986cb;
    }

    /* 전송 버튼 */
    #send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #7986cb, #64b5f6);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-size: 18px;
    }

    /* 전송 버튼 호버 효과 */
    #send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(121, 134, 203, 0.4);
    }

    /* 전송 버튼 비활성화 상태 */
    #send-btn:disabled {
      background: #e0e0e0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 입력창 아래 안내 텍스트 */
    .input-hint {
      font-size: 11px;
      color: #b0bec5;
      text-align: center;
      margin-top: 8px;
    }

    /* ===========================
       애니메이션 정의
    =========================== */

    /* 화면 나타나는 효과 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 메시지 슬라이드 인 효과 */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 로딩 점 튀어오르는 효과 */
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* ===========================
       모달 스타일 (설정 변경)
    =========================== */

    /* 설정 모달 배경 오버레이 */
    .modal-overlay {
      display: none; /* 기본적으로 숨김 */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    /* 설정 모달 내용 박스 */
    .modal-box {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    /* 모달 제목 */
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #5c6bc0;
      margin-bottom: 8px;
    }

    /* 모달 설명 텍스트 */
    .modal-desc {
      font-size: 13px;
      color: #90a4ae;
      margin-bottom: 20px;
    }

    /* 모달 안의 입력창 */
    .modal-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e3f2fd;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s ease;
      margin-bottom: 16px;
    }

    .modal-input:focus {
      border-color: #7986cb;
    }

    /* 모달 버튼들 */
    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    /* 모달 취소 버튼 */
    .modal-cancel-btn {
      flex: 1;
      padding: 12px;
      background: #f5f5f5;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      color: #78909c;
      transition: background 0.2s ease;
    }

    .modal-cancel-btn:hover {
      background: #eeeeee;
    }

    /* 모달 저장 버튼 */
    .modal-save-btn {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #7986cb, #64b5f6);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: transform 0.2s ease;
    }

    .modal-save-btn:hover {
      transform: translateY(-1px);
    }

    /* ===========================
       마이크 버튼 스타일 (음성 입력)
    =========================== */

    /* 마이크 버튼 기본 스타일 */
    #mic-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #ef9a9a, #e57373);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* 마이크 버튼 호버 효과 */
    #mic-btn:hover {
      transform: scale(1.05);
    }

    /* 녹음 중일 때 마이크 버튼 스타일 (빨간색 + 펄스 애니메이션) */
    #mic-btn.recording {
      background: linear-gradient(135deg, #f44336, #c62828);
      animation: pulse 1s infinite;
    }

    /* 브라우저가 음성 인식을 지원하지 않을 때 버튼 숨기기 */
    #mic-btn.hidden {
      display: none;
    }

    /* 펄스(맥박) 애니메이션 - 녹음 중임을 시각적으로 표현 */
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
      70%  { box-shadow: 0 0 0 10px rgba(244, 67, 54, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
    }

    /* ===========================
       스피커 버튼 스타일 (음성 출력)
    =========================== */

    /* 헤더 음성 출력 토글 버튼 */
    .header-voice-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      color: white;
      margin-right: 8px; /* 설정 버튼과의 간격 */
    }

    /* 스피커 버튼 호버 효과 */
    .header-voice-btn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    /* 음소거 상태일 때 반투명하게 표시 */
    .header-voice-btn.muted {
      opacity: 0.5;
    }

    /* ===========================
       업데이트 알림 토스트
    =========================== */
    #update-toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #37474f;
      color: white;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 9999;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
      animation: slideUp 0.3s ease;
    }

    #update-toast.show {
      display: flex;
    }

    #update-toast-btn {
      background: #7986cb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #update-toast-btn:hover {
      background: #5c6bc0;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 업데이트 알림 토스트 -->
  <div id="update-toast">
    🆕 새 버전이 있습니다
    <button id="update-toast-btn">새로고침</button>
  </div>

  <!-- ===========================
       채팅 화면
       API 키 저장 후 표시
  =========================== -->
  <div id="chat-screen">

    <!-- 채팅 헤더 -->
    <div class="chat-header">
      <div class="header-left">
        <!-- 상담사 아바타 -->
        <div class="header-avatar">🤗</div>
        <div>
          <div class="header-title">내 이야기를 들어줘 💙</div>
          <div class="header-subtitle">● 24시간 상담 중</div>
        </div>
      </div>

      <!-- 헤더 오른쪽 버튼 영역 (스피커 + 설정) -->
      <div style="display:flex;align-items:center;">
        <!-- 음성 출력 ON/OFF 토글 버튼 (스피커 아이콘) -->
        <button class="header-voice-btn" id="voice-toggle-btn" title="음성 출력 켜기/끄기">
          🔊
        </button>

      </div>
    </div>

    <!-- 메시지 목록 영역 -->
    <div id="messages-container">
      <!-- JavaScript로 메시지들이 이곳에 추가됨 -->
    </div>

    <!-- 메시지 입력 영역 -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <!-- 텍스트 입력창 (textarea 사용으로 여러 줄 입력 가능) -->
        <textarea
          id="message-input"
          placeholder="이야기를 입력하세요... (Enter로 전송, Shift+Enter로 줄바꿈)"
          rows="1"
        ></textarea>

        <!-- 마이크 버튼 (음성 입력) - 브라우저 미지원 시 JavaScript로 숨김 처리 -->
        <button id="mic-btn" title="음성으로 말하기">
          🎤
        </button>

        <!-- 전송 버튼 -->
        <button id="send-btn" title="전송">
          ➤
        </button>
      </div>

      <!-- 키보드 단축키 안내 -->
      <p class="input-hint">Enter 전송 · Shift+Enter 줄바꿈</p>
    </div>
  </div>


  <script>
    /* ===========================
       JavaScript 코드 시작
    =========================== */

    // -----------------------------------------------
    // 1. 전역 변수 선언
    // -----------------------------------------------


    // 대화 히스토리 배열 (AI에게 전달할 이전 대화 내용 저장)
    let conversationHistory = [];

    // AI 응답을 기다리는 중인지 여부 (중복 전송 방지)
    let isLoading = false;

    // AI 상담사 시스템 프롬프트 (대화 첫 메시지로 역할 설정)
    // v1 API는 systemInstruction을 지원하지 않으므로 첫 대화 턴으로 삽입
    const SYSTEM_PROMPT = `당신은 따뜻하고 공감능력이 뛰어난 심리 상담사입니다.
24시간 언제든지 사용자의 이야기를 들어주고,
감정을 이해하며, 심리적 지지를 제공합니다.
항상 한국어로 대화하세요.
판단하지 않고, 공감하며, 사용자가 자신의 감정을
안전하게 표현할 수 있는 공간을 만들어주세요.
필요한 경우 전문적인 도움을 받을 것을 권유하세요.`;

    // 시스템 프롬프트를 대화 히스토리 맨 앞에 삽입 (user/model 쌍으로 역할 부여)
    const SYSTEM_HISTORY = [
      { role: 'user', parts: [{ text: SYSTEM_PROMPT }] },
      { role: 'model', parts: [{ text: '네, 저는 따뜻한 심리 상담사로서 당신의 이야기를 들어드릴게요. 언제든지 편하게 이야기해 주세요.' }] }
    ];

    // -----------------------------------------------
    // 2. HTML 요소 가져오기
    // -----------------------------------------------

    // 채팅 화면 요소 참조
    const chatScreen = document.getElementById('chat-screen');

    // 채팅 관련 요소들
    const messagesContainer = document.getElementById('messages-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');



    // 음성 기능 관련 요소들
    const micBtn = document.getElementById('mic-btn');           // 마이크 버튼
    const voiceToggleBtn = document.getElementById('voice-toggle-btn'); // 스피커 토글 버튼

    // -----------------------------------------------
    // 3. 초기화 함수 - 페이지 로드 시 실행
    // -----------------------------------------------

    /**
     * 페이지 시작 시 실행되는 초기화 함수
     */
    function init() {
      showChatScreen();
    }

    // -----------------------------------------------
    // 4. 화면 전환 함수들
    // -----------------------------------------------

    /**
     * 채팅 화면 표시 및 초기화
     */
    function showChatScreen() {
      // 채팅 화면을 flex로 표시 (flex-direction: column 레이아웃 사용)
      chatScreen.style.display = 'flex';

      // 처음 채팅 화면이 열릴 때만 환영 메시지 추가
      if (messagesContainer.children.length === 0) {
        addWelcomeMessage();
      }
    }

    // -----------------------------------------------
    // 5. API 키 저장 처리
    // -----------------------------------------------

    // -----------------------------------------------
    // 6. 메시지 표시 함수들
    // -----------------------------------------------

    /**
     * 현재 시간을 "오전 09:30" 형식으로 반환
     * @returns {string} 포맷된 시간 문자열
     */
    function getCurrentTime() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const period = hours < 12 ? '오전' : '오후';
      const displayHours = hours % 12 || 12; // 12시간 형식으로 변환
      return `${period} ${displayHours}:${minutes}`;
    }

    /**
     * 채팅창에 메시지 추가
     * @param {string} text - 메시지 내용
     * @param {string} sender - 'user' 또는 'ai'
     */
    function addMessage(text, sender) {
      // 메시지 wrapper 요소 생성
      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', sender);

      // AI 메시지일 때만 아바타 표시
      if (sender === 'ai') {
        const avatar = document.createElement('div');
        avatar.classList.add('message-avatar');
        avatar.textContent = '🤗';
        wrapper.appendChild(avatar);
      }

      // 메시지 내용 영역 생성
      const content = document.createElement('div');
      content.classList.add('message-content');

      // 말풍선 생성
      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble');
      bubble.textContent = text; // XSS 방지를 위해 textContent 사용

      // 시간 표시 생성
      const time = document.createElement('span');
      time.classList.add('message-time');
      time.textContent = getCurrentTime();

      // 요소들 조합
      content.appendChild(bubble);
      content.appendChild(time);
      wrapper.appendChild(content);

      // 메시지 컨테이너에 추가
      messagesContainer.appendChild(wrapper);

      // 스크롤을 최신 메시지로 이동
      scrollToBottom();
    }

    /**
     * 로딩 인디케이터(점 3개 애니메이션) 추가
     * @returns {HTMLElement} 생성된 로딩 요소 (나중에 제거하기 위해 반환)
     */
    function addLoadingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', 'ai');
      wrapper.id = 'loading-indicator'; // 나중에 찾아서 제거하기 위한 ID

      // AI 아바타
      const avatar = document.createElement('div');
      avatar.classList.add('message-avatar');
      avatar.textContent = '🤗';

      // 로딩 말풍선
      const loadingBubble = document.createElement('div');
      loadingBubble.classList.add('loading-bubble');

      // 점 3개 생성
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.classList.add('loading-dot');
        loadingBubble.appendChild(dot);
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(loadingBubble);
      messagesContainer.appendChild(wrapper);

      scrollToBottom();
      return wrapper;
    }

    /**
     * 로딩 인디케이터 제거
     */
    function removeLoadingIndicator() {
      const loadingEl = document.getElementById('loading-indicator');
      if (loadingEl) {
        loadingEl.remove();
      }
    }

    /**
     * 에러 메시지를 채팅창에 표시
     * @param {string} errorText - 표시할 에러 메시지
     */
    function addErrorMessage(errorText) {
      const errorEl = document.createElement('div');
      errorEl.classList.add('error-message');
      errorEl.textContent = errorText;
      messagesContainer.appendChild(errorEl);
      scrollToBottom();
    }

    /**
     * 채팅창을 가장 아래로 스크롤
     */
    function scrollToBottom() {
      // setTimeout으로 DOM 업데이트 후 스크롤 (렌더링 완료 후 실행)
      setTimeout(() => {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, 50);
    }

    /**
     * 처음 채팅 화면 열릴 때 환영 메시지 표시
     */
    function addWelcomeMessage() {
      // 날짜 구분선 추가
      const dateDivider = document.createElement('div');
      dateDivider.classList.add('date-divider');
      const today = new Date();
      dateDivider.textContent = `${today.getMonth() + 1}월 ${today.getDate()}일`;
      messagesContainer.appendChild(dateDivider);

      // 환영 메시지 추가
      addMessage(
        '안녕하세요! 저는 당신의 이야기를 들어주는 상담사예요. 오늘 어떤 이야기를 나눠볼까요? 😊',
        'ai'
      );
    }

    // -----------------------------------------------
    // 7. Gemini API 호출 함수
    // -----------------------------------------------

    /**
     * Gemini API를 호출하여 AI 응답 받기
     * @param {string} userMessage - 사용자가 입력한 메시지
     * @returns {Promise<string>} AI의 응답 텍스트
     */
    async function callGeminiAPI(userMessage) {
      // 사용자 메시지를 대화 히스토리에 추가
      conversationHistory.push({
        role: 'user',
        parts: [{ text: userMessage }]
      });

      // 서버 프록시(/api/chat)를 통해 Gemini API 호출
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          // 시스템 프롬프트(역할 설정) + 실제 대화 히스토리를 합쳐서 전달
          contents: [...SYSTEM_HISTORY, ...conversationHistory],

          // AI 응답 설정
          generationConfig: {
            temperature: 0.9,
            maxOutputTokens: 1000
          }
        })
      });

      // 응답이 실패한 경우 에러 처리
      if (!response.ok) {
        let errorDetail = '';
        try {
          const errJson = await response.json();
          errorDetail = errJson?.error?.message || errJson?.error || '';
        } catch (e) { /* 무시 */ }

        if (response.status === 429) {
          throw new Error('API 요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요.');
        } else {
          throw new Error(`서버 오류가 발생했습니다. (오류 코드: ${response.status}${errorDetail ? ', ' + errorDetail : ''})`);
        }
      }

      // 응답 JSON 파싱
      const data = await response.json();

      // AI 응답 텍스트 추출
      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

      // 응답 텍스트가 없는 경우
      if (!aiText) {
        throw new Error('AI 응답을 받지 못했습니다. 다시 시도해주세요.');
      }

      // AI 응답을 대화 히스토리에 추가 (다음 대화에서 맥락 유지)
      conversationHistory.push({
        role: 'model',
        parts: [{ text: aiText }]
      });

      return aiText;
    }

    // -----------------------------------------------
    // 8. 메시지 전송 처리
    // -----------------------------------------------

    /**
     * 메시지를 전송하고 AI 응답을 받는 메인 함수
     */
    async function sendMessage() {
      // 이미 로딩 중이면 무시 (중복 전송 방지)
      if (isLoading) return;

      // 입력창의 텍스트 가져오기 (앞뒤 공백 제거)
      const userText = messageInput.value.trim();

      // 빈 메시지는 전송하지 않음
      if (!userText) return;

      // 로딩 상태 시작
      isLoading = true;
      sendBtn.disabled = true; // 전송 버튼 비활성화

      // 입력창 초기화 및 높이 리셋
      messageInput.value = '';
      messageInput.style.height = 'auto';

      // 사용자 메시지를 채팅창에 표시
      addMessage(userText, 'user');

      // 로딩 인디케이터 표시 (AI가 생각하는 중...)
      addLoadingIndicator();

      try {
        // Gemini API 호출하여 AI 응답 받기
        const aiResponse = await callGeminiAPI(userText);

        // 로딩 인디케이터 제거
        removeLoadingIndicator();

        // AI 응답 메시지 표시
        addMessage(aiResponse, 'ai');

        // AI 응답을 음성으로 읽어주기 (TTS가 켜져 있을 때만)
        speakText(aiResponse);

      } catch (error) {
        // 에러 발생 시 처리
        removeLoadingIndicator();

        // 에러 메시지 유형에 따라 다른 안내 표시
        if (error.message.includes('API 키')) {
          // API 키 오류
          addErrorMessage('⚠️ ' + error.message);
        } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
          // 네트워크 오류
          addErrorMessage('🌐 인터넷 연결을 확인해주세요. 잠시 후 다시 시도해주세요.');
        } else {
          // 기타 오류
          addErrorMessage('😔 ' + error.message);
        }

        // 오류 시 대화 히스토리에서 마지막 사용자 메시지 제거 (재전송 가능하도록)
        if (conversationHistory.length > 0 &&
            conversationHistory[conversationHistory.length - 1].role === 'user') {
          conversationHistory.pop();
        }

        console.error('API 호출 오류:', error); // 개발자 콘솔에 상세 오류 출력
      } finally {
        // 로딩 상태 종료 (성공/실패 관계없이 항상 실행)
        isLoading = false;
        sendBtn.disabled = false; // 전송 버튼 다시 활성화
        messageInput.focus(); // 입력창에 포커스 복원
      }
    }

    // -----------------------------------------------
    // 9. 입력창 이벤트 처리
    // -----------------------------------------------

    // 전송 버튼 클릭 이벤트
    sendBtn.addEventListener('click', sendMessage);

    // 키보드 입력 이벤트 (Enter: 전송, Shift+Enter: 줄바꿈)
    messageInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        // Shift 없이 Enter 누르면 전송
        e.preventDefault(); // 기본 줄바꿈 동작 방지
        sendMessage();
      }
      // Shift+Enter는 기본 동작(줄바꿈)이 그대로 실행됨
    });

    // 입력창 자동 높이 조절 (내용에 따라 높이 변경)
    messageInput.addEventListener('input', function () {
      // 높이를 auto로 리셋 후 실제 내용 높이로 조정
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // -----------------------------------------------
    // 11. 음성 입력 (STT - Speech to Text) 설정
    // -----------------------------------------------

    // Web Speech API의 SpeechRecognition 객체 가져오기
    // Chrome은 webkitSpeechRecognition, 표준은 SpeechRecognition 사용
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let recognition = null; // 음성 인식 객체
    let isRecording = false; // 현재 녹음 중인지 여부

    if (SpeechRecognition) {
      // 브라우저가 음성 인식을 지원하는 경우 초기화
      recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';        // 한국어로 음성 인식
      recognition.continuous = false;     // 한 번만 인식 (말이 끝나면 자동 종료)
      recognition.interimResults = false; // 중간 결과 없이 최종 결과만 사용

      // 음성 인식 성공 시: 변환된 텍스트를 입력창에 넣고 자동 전송
      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript; // 인식된 텍스트
        messageInput.value = transcript;   // 입력창에 텍스트 삽입
        stopRecording();                   // 녹음 종료 처리
        sendMessage();                     // 자동으로 메시지 전송
      };

      // 음성 인식 오류 발생 시 처리
      recognition.onerror = function(event) {
        stopRecording();
        // 'no-speech'(말이 없음)는 오류 메시지 생략 (흔한 정상 상황)
        if (event.error !== 'no-speech') {
          addErrorMessage('🎤 음성 인식 오류: ' + event.error);
        }
      };

      // 음성 인식이 종료될 때 (자동 또는 수동 종료)
      recognition.onend = function() {
        stopRecording();
      };

    } else {
      // 브라우저가 음성 인식을 지원하지 않아도 버튼은 표시하고, 클릭 시 안내 메시지 출력
    }

    /**
     * 녹음 시작 함수
     * 마이크 버튼을 빨간색으로 바꾸고 음성 인식 시작
     */
    function startRecording() {
      if (!recognition) {
        alert('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 또는 Edge를 사용해주세요.');
        return;
      }
      isRecording = true;
      micBtn.classList.add('recording');        // 빨간색 + 펄스 애니메이션
      micBtn.title = '녹음 중... (클릭하여 중지)';
      recognition.start(); // 음성 인식 시작
    }

    /**
     * 녹음 종료 함수
     * 마이크 버튼을 원래 상태로 되돌리고 음성 인식 중지
     */
    function stopRecording() {
      isRecording = false;
      micBtn.classList.remove('recording');     // 원래 색상으로 복원
      micBtn.title = '음성으로 말하기';
      try {
        recognition.stop(); // 음성 인식 중지 (이미 종료된 경우 오류 무시)
      } catch(e) { /* 이미 중지된 경우 무시 */ }
    }

    // 마이크 버튼 클릭 이벤트: 녹음 토글 (시작/중지)
    micBtn.addEventListener('click', function() {
      if (isRecording) {
        stopRecording(); // 녹음 중이면 중지
      } else {
        startRecording(); // 녹음 중이 아니면 시작
      }
    });

    // -----------------------------------------------
    // 13. 음성 출력 (TTS - Text to Speech) 설정
    // -----------------------------------------------

    // localStorage에서 TTS 설정 불러오기
    // 'false' 문자열이 저장된 경우만 OFF, 그 외(null 포함)는 기본값 ON
    let isTtsEnabled = localStorage.getItem('tts_enabled') !== 'false';

    /**
     * 스피커 버튼 아이콘과 상태를 현재 설정에 맞게 업데이트
     */
    function updateVoiceBtn() {
      voiceToggleBtn.textContent = isTtsEnabled ? '🔊' : '🔇';           // 아이콘 변경
      voiceToggleBtn.classList.toggle('muted', !isTtsEnabled);           // 음소거 스타일 적용
      voiceToggleBtn.title = isTtsEnabled ? '음성 출력 끄기' : '음성 출력 켜기'; // 툴팁 변경
    }

    // 스피커 버튼 초기 상태 적용
    updateVoiceBtn();

    // 스피커 버튼 클릭 시 TTS ON/OFF 토글
    voiceToggleBtn.addEventListener('click', function() {
      isTtsEnabled = !isTtsEnabled; // 상태 반전
      localStorage.setItem('tts_enabled', isTtsEnabled); // 설정 저장 (새로고침 후에도 유지)

      // TTS를 끄면 현재 재생 중인 음성도 즉시 중지
      if (!isTtsEnabled) {
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
      }

      updateVoiceBtn(); // 버튼 아이콘 업데이트
    });

    // 현재 재생 중인 오디오 (중지용)
    let currentAudio = null;

    /**
     * Typecast TTS (Cloudflare Function 프록시 경유)
     * 실패 시 브라우저 기본 TTS로 폴백
     * @param {string} text - 읽어줄 텍스트
     */
    async function speakText(text) {
      if (!isTtsEnabled) return;

      // 이전 오디오 중지
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      try {
        const res = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          console.warn('TTS /api/speak 오류:', res.status, errData);
          fallbackBrowserTTS(text);
          return;
        }

        const data = await res.json();
        if (!data.audioUrl) {
          console.warn('TTS audioUrl 없음:', data);
          fallbackBrowserTTS(text);
          return;
        }

        if (!isTtsEnabled) return;
        currentAudio = new Audio(data.audioUrl);
        currentAudio.play().catch(() => fallbackBrowserTTS(text));
      } catch (e) {
        console.warn('TTS 실패:', e);
        fallbackBrowserTTS(text);
      }
    }

    /** Typecast 실패 시 브라우저 기본 TTS로 폴백 */
    function fallbackBrowserTTS(text) {
      if (!isTtsEnabled || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;
      utterance.pitch = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    // -----------------------------------------------
    // 14. 페이지 로드 완료 시 초기화 실행
    // -----------------------------------------------

    // 페이지가 완전히 로드된 후 초기화 함수 실행
    init();

    // -----------------------------------------------
    // 15. PWA 서비스 워커 등록
    // -----------------------------------------------
    // -----------------------------------------------
    // 16. PWA 서비스 워커 등록 + 업데이트 감지
    // -----------------------------------------------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          console.log('서비스 워커 등록 완료');

          const toast = document.getElementById('update-toast');
          const toastBtn = document.getElementById('update-toast-btn');

          // 새 SW가 대기 중이면 바로 토스트 표시
          if (reg.waiting) {
            toast.classList.add('show');
          }

          // 새 SW가 설치될 때 감지
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              // 설치 완료 + 이전 SW가 있을 때(= 업데이트 상황)
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                toast.classList.add('show');
              }
            });
          });

          // "새로고침" 버튼 → 새 SW 즉시 활성화
          toastBtn.addEventListener('click', () => {
            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            toast.classList.remove('show');
          });

          // SW 교체 완료 → 페이지 새로고침
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });

        } catch (err) {
          console.warn('서비스 워커 등록 실패:', err);
        }
      });
    }
  </script>
</body>
</html>
